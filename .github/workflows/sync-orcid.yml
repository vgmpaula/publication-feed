name: Sync ORCID works

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 1 * *"
      timezone: "Europe/Lisbon"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch public ORCID works
        env:
          ORCID_CLIENT_ID: ${{ secrets.ORCID_CLIENT_ID }}
          ORCID_CLIENT_SECRET: ${{ secrets.ORCID_CLIENT_SECRET }}
        run: python scripts/sync_orcid.py

      - name: Commit changed publication data
        run: |
          if git diff --quiet -- docs/publications.json docs/counts.json; then
            echo "No publication changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/publications.json docs/counts.json
          git commit -m "Update publication record from ORCID"
          git push
